<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>NEU Lab Log — My Sessions</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0B1E3D" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="NEU Lab Log" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Nunito+Sans:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy:  { 950:'#060F1E', 900:'#0B1E3D', 800:'#102348', 700:'#163060', 600:'#1B4F9E' },
            gold:  { 600:'#B8891A', 500:'#D4A820', 400:'#E8BC30', 300:'#F5D060' },
          },
          fontFamily: {
            display: ['Outfit', 'sans-serif'],
            body:    ['Nunito Sans', 'sans-serif'],
          }
        }
      }
    };
  </script>

  <!-- Firebase Compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <link rel="stylesheet" href="css/professor-dashboard.css" />
</head>

<body style="background-color:#060F1E;color:white;">

<!-- Auth guard -->
<div id="authGuard" class="fixed inset-0 flex items-center justify-center z-50" style="background:#060F1E;">
  <div class="text-center">
    <div class="spinner mx-auto mb-4" style="width:32px;height:32px;border-width:4px"></div>
    <p class="text-white/40 text-sm font-display">Loading…</p>
  </div>
</div>

<!-- ══════════════════ TOP BAR ══════════════════ -->
<nav class="topbar">
  <div class="max-w-lg mx-auto px-4 h-14 flex items-center justify-between">
    <!-- Logo -->
    <div class="flex items-center gap-2.5">
      <div class="w-8 h-8 rounded-lg bg-navy-700/80 border border-gold-500/30 flex items-center justify-center shrink-0">
        <svg class="w-4 h-4" viewBox="0 0 32 32" fill="none">
          <rect x="4" y="4" width="10" height="10" rx="1.5" stroke="#D4A820" stroke-width="1.8" fill="none"/>
          <rect x="6.5" y="6.5" width="5" height="5" rx="0.5" fill="#D4A820"/>
          <rect x="18" y="4" width="10" height="10" rx="1.5" stroke="#D4A820" stroke-width="1.8" fill="none"/>
          <rect x="20.5" y="6.5" width="5" height="5" rx="0.5" fill="#D4A820"/>
          <rect x="4" y="18" width="10" height="10" rx="1.5" stroke="#D4A820" stroke-width="1.8" fill="none"/>
          <rect x="6.5" y="20.5" width="5" height="5" rx="0.5" fill="#D4A820"/>
          <rect x="18" y="24" width="10" height="4" rx="1" stroke="#D4A820" stroke-width="1.6" fill="none"/>
          <rect x="24" y="18" width="4" height="10" rx="1" stroke="#D4A820" stroke-width="1.6" fill="none"/>
        </svg>
      </div>
      <div>
        <p class="font-display font-bold text-white text-sm leading-tight">NEU <span class="logo-text">Lab Log</span></p>
        <p class="text-white/30 text-[10px] leading-tight">My Sessions</p>
      </div>
    </div>

    <!-- Profile + Admin switch -->
    <div class="flex items-center gap-2">
      <button id="switchAdminBtn" onclick="switchToAdmin()"
        class="hidden items-center gap-1.5 text-blue-300/70 hover:text-blue-300 text-xs font-semibold transition-colors px-2 py-1.5 rounded-lg hover:bg-blue-500/10"
      >
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/>
        </svg>
        <span class="hidden sm:inline">Switch to Admin</span>
      </button>
      <img id="userAvatar" src="" alt="" class="w-7 h-7 rounded-full border border-white/20 hidden" />
      <div class="text-right hidden sm:block">
        <p id="userName" class="text-white/80 text-xs font-semibold leading-tight truncate max-w-[140px]"></p>
        <p id="userEmail" class="text-white/35 text-[10px] leading-tight truncate max-w-[140px]"></p>
      </div>
    </div>
  </div>
</nav>

<!-- ══════════════════ MAIN CONTENT ══════════════════ -->
<main class="max-w-lg mx-auto px-4 py-5">

  <!-- ── Date pill ── -->
  <div class="flex items-center justify-between mb-4">
    <div class="flex items-center gap-2">
      <div class="live-pulse w-2 h-2 rounded-full bg-gold-400 shrink-0" id="statusDot"></div>
      <p id="dateLabel" class="text-white/40 text-xs font-semibold font-display uppercase tracking-wider"></p>
    </div>
    <button onclick="loadSessions()" id="refreshBtn"
      class="text-white/30 hover:text-white/60 transition-colors p-1.5 rounded-lg hover:bg-white/05">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
      </svg>
    </button>
  </div>

  <!-- ── Active Session Card ── -->
  <div id="activeSessionCard" class="rounded-2xl p-5 mb-4 slide-up hidden session-active-card">
    <div class="flex items-start justify-between mb-4">
      <div>
        <div class="flex items-center gap-2 mb-1">
          <div class="live-pulse w-2 h-2 rounded-full bg-emerald-400 shrink-0"></div>
          <span class="text-emerald-400 text-xs font-bold font-display uppercase tracking-wide">Active Session</span>
        </div>
        <h2 id="activeRoomName" class="font-display font-bold text-white text-3xl leading-none"></h2>
      </div>
      <div class="w-12 h-12 rounded-xl bg-emerald-500/15 border border-emerald-500/25 flex items-center justify-center shrink-0">
        <svg class="w-6 h-6 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
        </svg>
      </div>
    </div>

    <div class="flex items-center gap-4 mb-5">
      <div>
        <p class="text-white/35 text-[10px] font-bold uppercase tracking-wider font-display mb-0.5">Checked In</p>
        <p id="activeCheckinTime" class="text-white/80 text-sm font-semibold"></p>
      </div>
      <div class="w-px h-8 bg-white/10"></div>
      <div>
        <p class="text-white/35 text-[10px] font-bold uppercase tracking-wider font-display mb-0.5">Duration</p>
        <p id="activeDuration" class="text-emerald-400 text-sm font-bold font-display"></p>
      </div>
    </div>

    <!-- Checkout button -->
    <button id="checkoutBtn" onclick="checkoutFromRoom()"
      class="btn-checkout w-full py-3.5 rounded-xl text-white font-bold font-display text-sm flex items-center justify-center gap-2.5">
      <svg class="w-4.5 h-4.5" style="width:18px;height:18px" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
      </svg>
      Check Out from Room
    </button>
  </div>

  <!-- ── No Active Session Card ── -->
  <div id="noSessionCard" class="rounded-2xl p-6 mb-4 hidden session-inactive-card text-center">
    <div class="w-14 h-14 rounded-2xl bg-white/05 border border-dashed border-white/15 flex items-center justify-center mx-auto mb-4">
      <svg class="w-7 h-7 text-white/20" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/>
      </svg>
    </div>
    <p class="font-display font-semibold text-white/60 text-sm mb-1.5">No Active Session</p>
    <p class="text-white/30 text-xs leading-relaxed mb-4">You are not currently checked in to any room. Scan a room QR code to start a session.</p>
    <a href="scanner.html"
      class="inline-flex items-center gap-2 px-5 py-2.5 rounded-xl bg-gold-500/20 hover:bg-gold-500/30 text-gold-400 border border-gold-500/30 text-xs font-bold font-display transition-all">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 3.5V16M4 4h6v6H4V4zm10 0h6v6h-6V4zM4 14h6v6H4v-6z"/>
      </svg>
      Scan a QR Code
    </a>
  </div>

  <!-- ── Loading state ── -->
  <div id="loadingCard" class="glass-card rounded-2xl p-8 mb-4 flex items-center justify-center gap-3">
    <div class="spinner"></div>
    <span class="text-white/40 text-sm">Loading sessions…</span>
  </div>

  <!-- ── Today's Sessions History ── -->
  <div id="historySection" class="hidden">
    <div class="flex items-center justify-between mb-3">
      <h3 class="font-display font-semibold text-white/80 text-sm flex items-center gap-2">
        <svg class="w-3.5 h-3.5 text-gold-400" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M6 2a1 1 0 00-1 1v1H4a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-1V3a1 1 0 10-2 0v1H7V3a1 1 0 00-1-1zm0 5a1 1 0 000 2h8a1 1 0 100-2H6z" clip-rule="evenodd"/>
        </svg>
        Today's Sessions
      </h3>
      <span id="sessionCount" class="text-white/25 text-xs font-display"></span>
    </div>

    <div class="glass-card rounded-2xl overflow-hidden">
      <div id="sessionsList" class="px-4 divide-y divide-white/05">
        <!-- Populated by JS -->
      </div>
    </div>
  </div>

</main>

<!-- ══════════════════ BOTTOM NAV ══════════════════ -->
<nav class="bottom-nav">
  <div class="max-w-lg mx-auto flex">
    <a href="scanner.html" class="nav-tab">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 3.5V16M4 4h6v6H4V4zm10 0h6v6h-6V4zM4 14h6v6H4v-6z"/>
      </svg>
      Scan
    </a>
    <a href="professor-dashboard.html" class="nav-tab active">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
      </svg>
      Sessions
    </a>
    <button onclick="handleSignOut()" class="nav-tab">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
      </svg>
      Sign Out
    </button>
    <!-- Shown only when an admin is in professor mode -->
    <button id="switchAdminBtnBottom" onclick="switchToAdmin()" class="nav-tab" style="display:none;color:rgba(147,197,253,0.75);">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/>
      </svg>
      Admin
    </button>
  </div>
</nav>

<!-- Toast -->
<div id="toast">
  <div id="toastContent" class="rounded-xl px-4 py-3 text-xs flex items-center gap-2.5 shadow-2xl backdrop-blur-md min-w-[200px]"></div>
</div>

<script src="js/firebase-config.js"></script>
<script src="js/professor-dashboard.js"></script>
</body>
</html>
